      // Trânsito
      traffic:     { label: 'Congestionamento', emoji: '🐢', color: '#F4511E', type: 'traffic' },
      hazard:      { label: 'Perigo na via',    emoji: '⚠️', color: '#FFB300', type: 'traffic' },
      accident:    { label: 'Acidente',         emoji: '🚗', color: '#E53935', type: 'traffic' },
      policeblitz: { label: 'Blitz Policial',   emoji: '👮', color: '#3949AB', type: 'traffic' },
      drunkcheck:  { label: 'Lei Seca',         emoji: '🍺', color: '#00897B', type: 'traffic' },
      flood:       { label: 'Alagamento',       emoji: '🌊', color: '#1E88E5', type: 'traffic' },
      closure:     { label: 'Interdição',       emoji: '🚫', color: '#8E24AA', type: 'traffic' },
      roadwork:    { label: 'Obras',            emoji: '🚧', color: '#FB8C00', type: 'traffic' },
      // Entretenimento
      show:        { label: 'Show',             emoji: '🎤', color: '#E91E63', type: 'entertainment' },
      festival:    { label: 'Festival',         emoji: '🎪', color: '#9C27B0', type: 'entertainment' },
      sports:      { label: 'Esporte',          emoji: '⚽', color: '#2196F3', type: 'entertainment' },
      fair:        { label: 'Feira',            emoji: '🛍️', color: '#FF9800', type: 'entertainment' },
      food:        { label: 'Gastronomia',      emoji: '🍔', color: '#F44336', type: 'entertainment' },
      art:         { label: 'Arte/Cultura',     emoji: '🎨', color: '#00BCD4', type: 'entertainment' },
      party:       { label: 'Festa',            emoji: '🎉', color: '#FF4081', type: 'entertainment' },
      other:       { label: 'Outro',            emoji: '📍', color: '#607D8B', type: 'entertainment' },
    };

    let allEvents = [], activeFilter = 'all', map = null, markers = [], activeIdx = -1;

    // ── AdSense helpers ───────────────────────────────────────────────
    // IDs dos ad units — crie em adsense.google.com → Anúncios → Por unidade de anúncio
    // e substitua os valores abaixo pelos IDs gerados.
    const AD_SLOTS = {
      sidebar:  'SLOT_SIDEBAR',  // 📌 ex: '1234567890'  (300×250 — sidebar)
      list:     'SLOT_LIST',     // 📌 ex: '0987654321'  (responsivo — entre eventos)
      modal:    'SLOT_MODAL',    // 📌 ex: '1122334455'  (responsivo — modal)
    };

    function pushAd(container, slot, format = 'auto') {
      if (!container || slot.startsWith('SLOT_')) return; // ainda não configurado
      const ins = document.createElement('ins');
      ins.className = 'adsbygoogle';
      ins.style.display = 'block';
      ins.setAttribute('data-ad-client', 'ca-pub-4349309505537394');
      ins.setAttribute('data-ad-slot', slot);
      ins.setAttribute('data-ad-format', format);
      ins.setAttribute('data-full-width-responsive', 'true');
      container.appendChild(ins);
      try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (_) {}
    }

    function getMeta(ev) {
      return CATS[ev.category] ?? { label: ev.category, emoji: '📍', color: '#607D8B', type: ev._type };
    }

    function timeAgo(ms) {
      const d = Date.now() - ms, m = Math.floor(d / 60000);
      if (m < 1) return 'agora';
      if (m < 60) return `há ${m} min`;
      const h = Math.floor(m / 60);
      return h < 24 ? `há ${h}h` : `há ${Math.floor(h/24)}d`;
    }

    function makeLeiSecaIcon() {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="96" height="88" viewBox="0 0 96 88">
        <!-- anel externo -->
        <rect x="1" y="1" width="94" height="74" rx="20" fill="none" stroke="#00C853" stroke-width="2" opacity="0.35"/>
        <!-- anel interno -->
        <rect x="7" y="7" width="82" height="62" rx="16" fill="none" stroke="#00C853" stroke-width="2" opacity="0.6"/>
        <!-- corpo -->
        <rect x="14" y="14" width="68" height="50" rx="13" fill="#00C853" stroke="#fff" stroke-width="2.5"/>
        <!-- emoji -->
        <text x="48" y="36" text-anchor="middle" font-size="20" dominant-baseline="middle">🍺</text>
        <!-- label -->
        <text x="48" y="55" text-anchor="middle" font-size="10" font-weight="900" fill="#fff" letter-spacing="1.5">LEI SECA</text>
        <!-- cauda -->
        <polygon points="48,86 38,74 58,74" fill="#00C853" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [96, 88], iconAnchor: [48, 88], popupAnchor: [0, -90] });
    }

    function makeIcon(emoji, color, urgent) {
      const pulse = urgent
        ? `<circle cx="24" cy="24" r="22" fill="none" stroke="${color}" stroke-width="2.5" opacity="0.35"/>`
        : '';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="52" height="62" viewBox="0 0 52 62">
        ${pulse}
        <rect x="6" y="6" width="40" height="40" rx="13" fill="${color}" stroke="#fff" stroke-width="2.5"/>
        <text x="26" y="31" text-anchor="middle" font-size="22" dominant-baseline="middle">${emoji}</text>
        <polygon points="26,60 18,46 34,46" fill="${color}"/>
        <polygon points="26,58 18,46 34,46" fill="${color}" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [52, 62], iconAnchor: [26, 62], popupAnchor: [0, -64] });
    }

    function filtered() {
      if (activeFilter === 'all') return allEvents;
      if (activeFilter === 'traffic') return allEvents.filter(e => e._type === 'traffic');
      if (activeFilter === 'entertainment') return allEvents.filter(e => e._type === 'entertainment');
      return allEvents.filter(e => e.category === activeFilter);
    }

    function renderAll() {
      const evs = filtered();
      updateCounts(evs.length);
      renderMarkers(evs);
      renderList(evs);
    }

    function updateCounts(n) {
      document.getElementById('navCount').textContent = `${allEvents.length} eventos ao vivo`;
      document.getElementById('sidebarTitle').textContent = `${n} evento${n !== 1 ? 's' : ''}`;
      document.getElementById('sidebarBadge').textContent = n;
    }

    function renderMarkers(evs) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      activeIdx = -1;

      evs.forEach((ev, i) => {
        const meta = getMeta(ev);
        const urgent = (ev.confirmations ?? 0) >= 3;
        const city = [ev.cityName, ev.stateUF].filter(Boolean).join(', ');
        const confirms = ev.confirmations > 0
          ? `<span class="map-popup-chip" style="background:${urgent ? '#E53935' : '#43A047'}">${ev.confirmations} ✓</span>` : '';
        const popup = `<div class="map-popup">
          <div class="map-popup-icon" style="background:${meta.color}22">${meta.emoji}</div>
          <div>
            <div class="map-popup-title">${meta.label}</div>
            ${ev.title ? `<div class="map-popup-desc">${ev.title}</div>` : ''}
            <div class="map-popup-meta">
              ${confirms}
              ${city ? `<span>${city}</span>` : ''}
              <span>${timeAgo(ev.createdAt)}</span>
            </div>
          </div>
        </div>`;
        const icon = ev.category === 'drunkcheck'
          ? makeLeiSecaIcon()
          : makeIcon(meta.emoji, meta.color, urgent);
        const m = L.marker([ev.latitude, ev.longitude], { icon }).addTo(map);
        m.on('click', () => { selectItem(i); openModal(ev); });
        markers.push(m);
      });

      if (markers.length > 0) {
        map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2), { maxZoom: 13 });
      }
    }

    function renderList(evs) {
      const el = document.getElementById('eventList');
      if (evs.length === 0) {
        el.innerHTML = `<div class="list-empty"><span>📍</span><p>Nenhum evento ativo nessa categoria.</p></div>`;
        return;
      }

      // Monta HTML dos cards + marcadores de posição para anúncios
      const AD_EVERY = 5; // injeta 1 anúncio a cada N eventos
      const parts = [];
      evs.forEach((ev, i) => {
        const meta = getMeta(ev);
        const city = [ev.cityName, ev.stateUF].filter(Boolean).join(', ');
        const confirms = ev.confirmations ?? 0;
        const denials  = ev.denials ?? 0;
        const urgent   = confirms >= 3;

        let statsHtml = '';
        if (ev._type === 'entertainment') {
          const likes     = ev.likes ?? ev.likesCount ?? 0;
          const attendees = ev.attendeeCount ?? ev.rsvpCount ?? 0;
          const views     = ev.viewCount ?? ev.views ?? 0;
          const comments  = ev.commentCount ?? ev.comments ?? 0;
          const rating    = ev.avgRating ?? ev.averageRating ?? 0;
          const pills = [];
          if (likes > 0)     pills.push(`<span class="ev-stat-pill">❤️ ${likes}</span>`);
          if (attendees > 0) pills.push(`<span class="ev-stat-pill">🎟️ ${attendees} vão</span>`);
          if (views > 0)     pills.push(`<span class="ev-stat-pill">👁️ ${views}</span>`);
          if (comments > 0)  pills.push(`<span class="ev-stat-pill">💬 ${comments}</span>`);
          if (rating > 0)    pills.push(`<span class="ev-stat-pill">⭐ ${rating.toFixed(1)}</span>`);
          if (pills.length)  statsHtml = `<div class="ev-stats-row">${pills.join('')}</div>`;
        } else {
          const pills = [];
          if (confirms > 0) pills.push(`<span class="ev-stat-pill" style="color:${urgent?'#EF9A9A':'#A5D6A7'}">✓ ${confirms}</span>`);
          if (denials > 0)  pills.push(`<span class="ev-stat-pill">✗ ${denials}</span>`);
          if (pills.length) statsHtml = `<div class="ev-stats-row">${pills.join('')}</div>`;
        }

        parts.push(`<div class="ev-item" data-i="${i}" onclick="window.__evSel(${i})">
          <div class="ev-icon" style="background:${meta.color}25">${meta.emoji}</div>
          <div class="ev-body">
            <div class="ev-name">${meta.label}${ev.title ? ' — ' + ev.title : ''}</div>
            <div class="ev-sub">${[city, timeAgo(ev.createdAt)].filter(Boolean).join(' · ')}</div>
            ${statsHtml}
          </div>
        </div>`);

        // Placeholder de anúncio a cada AD_EVERY eventos (exceto após o último)
        if ((i + 1) % AD_EVERY === 0 && i < evs.length - 1) {
          parts.push(`<div class="list-ad-item" data-ad-list="true">
            <span class="ad-label">Publicidade</span>
          </div>`);
        }
      });

      el.innerHTML = parts.join('');

      // Inicializa os ad units da lista via DOM (não via innerHTML — scripts não executam)
      el.querySelectorAll('[data-ad-list]').forEach(wrap => {
        pushAd(wrap, AD_SLOTS.list, 'auto');
      });
    }

    function fmtDate(ms) {
      if (!ms) return null;
      return new Date(ms).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function timeLeft(ms) {
      const diff = ms - Date.now();
      if (diff <= 0) return 'expirado';
      const m = Math.floor(diff / 60000);
      if (m < 60) return `expira em ${m} min`;
      const h = Math.floor(m / 60);
      return `expira em ${h}h${m % 60 > 0 ? (m%60)+'min' : ''}`;
    }

    function tierLabel(tier) {
      if (!tier) return null;
      const map = { bronze: { text: '🥉 Bronze', color: '#CD7F32' }, silver: { text: '🥈 Prata', color: '#9E9E9E' }, gold: { text: '🥇 Ouro', color: '#FFD700' } };
      return map[tier] ?? null;
    }

    function mapsLinks(ev) {
      const q = encodeURIComponent([ev.cityName, ev.stateUF].filter(Boolean).join(', ') || (ev.latitude + ',' + ev.longitude));
      const coord = `${ev.latitude},${ev.longitude}`;
      return {
        maps: `https://www.google.com/maps/search/?api=1&query=${coord}`,
        waze: `https://waze.com/ul?ll=${coord}&navigate=yes`,
      };
    }

    function openModal(ev) {
      const meta = getMeta(ev);
      const city = [ev.cityName, ev.stateUF].filter(Boolean).join(', ');
      const urgent = (ev.confirmations ?? 0) >= 3;
      const links = mapsLinks(ev);
      let html = '';

      if (ev._type === 'entertainment') {
        // ── Foto ──────────────────────────────────────────────────────────
        const photo = ev.promotionPhotoUrls?.[0] ?? ev.promotionPhotoUrl ?? ev.photoUrl ?? null;
        const tier = tierLabel(ev.tier ?? ev.promotionTier ?? null);
        if (photo) {
          html += `<img class="ev-modal-photo" src="${photo}" alt="" loading="lazy"/>`;
        } else {
          html += `<div class="ev-modal-photo-placeholder" style="background:${meta.color}22">${meta.emoji}</div>`;
        }
        // ── Header ────────────────────────────────────────────────────────
        html += `<div class="ev-modal-header">
          <div class="ev-modal-icon" style="background:${meta.color}25">${meta.emoji}</div>
          <div class="ev-modal-titles">
            <div class="ev-modal-cat" style="color:${meta.color}">${meta.label}</div>
            <div class="ev-modal-title">${ev.title ?? meta.label}</div>
            ${city ? `<div class="ev-modal-location">📍 ${city}</div>` : ''}
            ${tier ? `<span class="ev-modal-tag" style="background:${tier.color}30;color:${tier.color}">${tier.text}</span>` : ''}
          </div>
          <button class="ev-modal-close" onclick="closeModal()">✕</button>
        </div>`;
        // ── Meta ──────────────────────────────────────────────────────────
        html += `<div class="ev-modal-meta">
          <span class="ev-meta-chip">🕐 ${timeAgo(ev.createdAt)}</span>
          ${ev.expiresAt ? `<span class="ev-meta-chip">⏳ ${timeLeft(ev.expiresAt?.toMillis?.() ?? ev.expiresAt)}</span>` : ''}
        </div>`;
        // ── Stats ─────────────────────────────────────────────────────────
        const likes = ev.likes ?? ev.likesCount ?? 0;
        const comments = ev.commentCount ?? ev.comments ?? 0;
        const attendees = ev.attendeeCount ?? ev.rsvpCount ?? 0;
        const rating = ev.avgRating ?? ev.averageRating ?? 0;
        const rCount = ev.ratingCount ?? 0;
        html += `<div class="ev-modal-stats">
          <div class="ev-stat"><div class="ev-stat-val">❤️ ${likes}</div><div class="ev-stat-label">Curtidas</div></div>
          <div class="ev-stat"><div class="ev-stat-val">💬 ${comments}</div><div class="ev-stat-label">Comentários</div></div>
          <div class="ev-stat"><div class="ev-stat-val">🎟️ ${attendees}</div><div class="ev-stat-label">Vou lá</div></div>
          ${rating > 0 ? `<div class="ev-stat"><div class="ev-stat-val">⭐ ${rating.toFixed(1)}</div><div class="ev-stat-label">${rCount} aval.</div></div>` : ''}
        </div>`;
        // ── Descrição ──────────────────────────────────────────────────────
        if (ev.description) html += `<p class="ev-modal-desc">${ev.description}</p>`;
        // ── Data do evento ────────────────────────────────────────────────
        const evDate = ev.eventDate?.toMillis?.() ?? ev.eventDate ?? null;
        if (evDate) html += `<div class="ev-meta-chip" style="margin-top:10px">📅 ${fmtDate(evDate)}</div>`;
        // ── Ações ─────────────────────────────────────────────────────────
        html += `<div class="ev-divider"></div>`;
        html += `<div class="ev-modal-actions">
          <a class="ev-action" href="${links.maps}" target="_blank" rel="noopener">
            <span class="ev-action-icon">🗺️</span><span class="ev-action-label">Google Maps</span>
          </a>
          <a class="ev-action" href="${links.waze}" target="_blank" rel="noopener">
            <span class="ev-action-icon">🚗</span><span class="ev-action-label">Waze</span>
          </a>`;
        if (ev.externalLink || ev.ticketLink) {
          html += `<a class="ev-action" href="${ev.externalLink ?? ev.ticketLink}" target="_blank" rel="noopener">
            <span class="ev-action-icon">🔗</span><span class="ev-action-label">Site / Ingressos</span>
          </a>`;
        }
        if (evDate) {
          const calTitle = encodeURIComponent(ev.title ?? meta.label);
          const calDate = new Date(evDate).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
          html += `<a class="ev-action" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=${calTitle}&dates=${calDate}/${calDate}" target="_blank" rel="noopener">
            <span class="ev-action-icon">📅</span><span class="ev-action-label">Agenda</span>
          </a>`;
        }
        html += `</div>`;

      } else {
        // ── Trânsito ──────────────────────────────────────────────────────
        html += `<div class="ev-modal-photo-placeholder" style="background:${meta.color}22">${meta.emoji}</div>`;
        html += `<div class="ev-modal-header">
          <div class="ev-modal-icon" style="background:${meta.color}25">${meta.emoji}</div>
          <div class="ev-modal-titles">
            <div class="ev-modal-cat" style="color:${meta.color}">${meta.label}</div>
            <div class="ev-modal-title">${ev.title ?? meta.label}</div>
            ${city ? `<div class="ev-modal-location">📍 ${city}</div>` : ''}
          </div>
          <button class="ev-modal-close" onclick="closeModal()">✕</button>
        </div>`;
        // ── Meta ──────────────────────────────────────────────────────────
        const expMs = ev.expiresAt?.toMillis?.() ?? ev.expiresAt ?? null;
        html += `<div class="ev-modal-meta">
          <span class="ev-meta-chip">🕐 ${timeAgo(ev.createdAt)}</span>
          ${expMs ? `<span class="ev-meta-chip">⏳ ${timeLeft(expMs)}</span>` : ''}
          ${ev.createdAt ? `<span class="ev-meta-chip">📅 ${fmtDate(ev.createdAt)}</span>` : ''}
        </div>`;
        // ── Confirmações / Negações ────────────────────────────────────────
        const confirms = ev.confirmations ?? 0;
        const denials = ev.denials ?? 0;
        html += `<div class="ev-modal-stats">
          <div class="ev-stat"><div class="ev-stat-val" style="color:${urgent ? '#EF5350' : '#66BB6A'}">✓ ${confirms}</div><div class="ev-stat-label">Confirmações</div></div>
          <div class="ev-stat"><div class="ev-stat-val">✗ ${denials}</div><div class="ev-stat-label">Negações</div></div>
          <div class="ev-stat"><div class="ev-stat-val">${confirms - denials}</div><div class="ev-stat-label">Saldo</div></div>
        </div>`;
        // ── Descrição ──────────────────────────────────────────────────────
        if (ev.description) html += `<p class="ev-modal-desc">${ev.description}</p>`;
        // ── Ações ─────────────────────────────────────────────────────────
        html += `<div class="ev-divider"></div>`;
        html += `<div class="ev-modal-actions">
          <a class="ev-action" href="${links.maps}" target="_blank" rel="noopener">
            <span class="ev-action-icon">🗺️</span><span class="ev-action-label">Google Maps</span>
          </a>
          <a class="ev-action" href="${links.waze}" target="_blank" rel="noopener">
            <span class="ev-action-icon">🚗</span><span class="ev-action-label">Waze</span>
          </a>
          <a class="ev-action" href="https://waze.com/ul?ll=${ev.latitude},${ev.longitude}&navigate=yes" target="_blank" rel="noopener">
            <span class="ev-action-icon">🧭</span><span class="ev-action-label">Navegar</span>
          </a>
        </div>`;
      }

      // Rodapé com anúncio responsivo
      html += `<div class="modal-ad-wrap" id="modalAdSlot">
        <span class="ad-label">Publicidade</span>
      </div>`;

      const body = document.getElementById('evModalBody');
      body.innerHTML = html;
      document.getElementById('evModalOverlay').classList.add('open');

      // Inicializa o ad unit do modal
      pushAd(document.getElementById('modalAdSlot'), AD_SLOTS.modal, 'auto');
    }

    function closeModal() {
      document.getElementById('evModalOverlay').classList.remove('open');
    }

    // Fechar clicando fora do modal
    document.getElementById('evModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    window.closeModal = closeModal;

    function selectItem(i) {
      activeIdx = i;
      document.querySelectorAll('.ev-item').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
      const card = document.querySelectorAll('.ev-item')[i];
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      const evs = filtered();
      const ev = evs[i];
      if (ev && markers[i]) {
        map.setView([ev.latitude, ev.longitude], 14, { animate: true });
      }
      if (ev) openModal(ev);
    }

    window.__evSel = selectItem;

    let trafficEvents = [], entertainmentEvents = [];

    function mergeAndRender() {
      allEvents = [...trafficEvents, ...entertainmentEvents]
        .sort((a, b) => b.createdAt - a.createdAt);
      document.getElementById('mapOverlay').style.display = 'none';
      renderAll();
    }

    function loadEvents() {
      document.getElementById('mapOverlay').style.display = 'flex';
      const now = Timestamp.now();
      const toEv = (d, type) => ({
        ...d.data(), id: d.id, _type: type,
        createdAt: d.data().createdAt?.toMillis?.() ?? Date.now(),
        confirmations: d.data().confirmations ?? 0,
      });

      // Listeners em tempo real: novos eventos, likes/views/comentários e
      // expirações refletem na hora, sem precisar recarregar a página.
      onSnapshot(query(collection(db, 'events'), where('expiresAt', '>', now)), snap => {
        trafficEvents = snap.docs.map(d => toEv(d, 'traffic'));
        mergeAndRender();
      }, e => console.error('Firestore (events):', e));

      onSnapshot(query(collection(db, 'entertainment_events'), where('expiresAt', '>', now)), snap => {
        entertainmentEvents = snap.docs.map(d => toEv(d, 'entertainment'));
        mergeAndRender();
      }, e => console.error('Firestore (entertainment_events):', e));
    }

    let userMarker = null;

    function initMap() {
      map = L.map('evMap', { zoomControl: true, attributionControl: false }).setView([-15.77, -47.92], 4);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 19,
      }).addTo(map);
    }

    function locateUser() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        // Centraliza o mapa na região do usuário
        map.setView([lat, lng], 13, { animate: true });
        // Ícone de posição do usuário
        const userIcon = L.divIcon({
          html: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
            <circle cx="11" cy="11" r="9" fill="#2196F3" stroke="#fff" stroke-width="2.5"/>
            <circle cx="11" cy="11" r="3.5" fill="#fff"/>
          </svg>`,
          className: '', iconSize: [22, 22], iconAnchor: [11, 11],
        });
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 })
          .bindPopup('<div style="color:#fff;background:#1C1C1E;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:600">📍 Você está aqui</div>', { className: '' })
          .addTo(map);
      }, () => {/* permissão negada — silencioso */}, { timeout: 6000 });
    }

    // Filtros
    document.querySelectorAll('.f-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.f-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.type;
        renderAll();
      });
    });

    // Refresh — dados já chegam em tempo real via onSnapshot; o botão apenas
    // re-renderiza a partir do estado mais recente (evita listeners duplicados).
    document.getElementById('btnRefresh').addEventListener('click', mergeAndRender);

    initMap();
    locateUser();
    loadEvents();

    // Inicializa o ad fixo do rodapé da sidebar
    // (o <ins> já está no HTML estático; apenas dá o push)
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (_) {}
  </script>
  <script src="/i18n.js"></script>
  <script src="/i18n-extra.js"></script>
</body>
</html>
