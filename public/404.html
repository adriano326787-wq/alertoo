<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Alertoo</title>
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 480px; }
    .emoji { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; }
    p { font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 28px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    a {
      display: inline-block;
      padding: 13px 26px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity .15s;
    }
    a:hover { opacity: .85; }
    .primary { background: #FF5722; color: #fff; }
    .secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🗺️</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Veja o mapa de alertas ao vivo ou volte para a página inicial.</p>
    <div class="links">
      <a class="primary" href="/eventos">🔴 Mapa ao vivo</a>
      <a class="secondary" href="/">Página inicial</a>
    </div>
  </div>
</body>
</html>
